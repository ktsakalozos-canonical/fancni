name: Nightly Knowledge

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  knowledge:
    runs-on: ubuntu-latest
    # Only run on the default branch
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for recent commits
        id: check_commits
        run: |
          COUNT=$(git log --since='7 days ago' --oneline | wc -l)
          echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Skip if no recent commits
        if: steps.check_commits.outputs.commit_count == '0'
        run: |
          echo "No commits in the last 7 days. Skipping knowledge generation."
          exit 0

      - name: Gather context
        if: steps.check_commits.outputs.commit_count != '0'
        id: context
        run: |
          TREE=$(find . -not -path './.git/*' -not -path './_output/*' -not -path './vendor/*' -not -path './misc/*' | head -80)
          COMMITS=$(git log --since='7 days ago' --pretty=format:'%h %s' | head -30)
          GOMOD=$(head -30 go.mod 2>/dev/null || echo "")
          MAKEFILE=$(head -40 Makefile 2>/dev/null || echo "")

          {
            echo "PROJECT_CONTEXT<<ENDOFCONTEXT"
            echo "=== Project Tree ==="
            echo "$TREE"
            echo ""
            echo "=== Recent Commits (last 7 days) ==="
            echo "$COMMITS"
            echo ""
            echo "=== go.mod (top 30 lines) ==="
            echo "$GOMOD"
            echo ""
            echo "=== Makefile (first 40 lines) ==="
            echo "$MAKEFILE"
            echo "ENDOFCONTEXT"
          } >> "$GITHUB_ENV"

      - name: Generate architect knowledge
        if: steps.check_commits.outputs.commit_count != '0'
        id: architect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYSTEM_PROMPT="You are an expert software architect generating a knowledge reference file for an AI architect agent working on this project.
          You may refine, update, or build on the prior knowledge provided — keep what is still accurate and update what has changed.

          Focus on:
          - System boundaries and module responsibilities
          - Architectural decisions evident in the code
          - Dependency graph between internal packages
          - Incomplete or in-progress work (from recent commits and TODOs)
          - Areas of technical debt

          Output rules:
          - Output pure markdown, no preamble or meta-commentary
          - Stay under 500 lines
          - Be specific and actionable, not generic
          - Use the actual names, files, and patterns present in this codebase"

          PRIOR_KNOWLEDGE=$(head -100 misc/knowledge/architect-knowledge.md 2>/dev/null || echo "")
          if [ -n "$PRIOR_KNOWLEDGE" ]; then
            USER_MESSAGE="${PROJECT_CONTEXT}

          === Prior Knowledge ===
          ${PRIOR_KNOWLEDGE}"
          else
            USER_MESSAGE="$PROJECT_CONTEXT"
          fi

          PAYLOAD=$(jq -n \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "$USER_MESSAGE" \
            '{
              model: "openai/gpt-4o-mini",
              messages: [
                {role: "system", content: $system},
                {role: "user", content: $user}
              ],
              max_tokens: 2048,
              temperature: 0.3
            }')

          retry_curl() {
            local max_retries=3
            local delay=10
            for i in $(seq 1 "$max_retries"); do
              HTTP_CODE=$(curl -sL -w '%{http_code}' -o /tmp/curl_response_$$.json \
                "$@")
              if [ -z "$HTTP_CODE" ] || [ "$HTTP_CODE" = "000" ]; then
                echo "::warning::curl failed (no HTTP response, attempt $i/$max_retries). Retrying in ${delay}s..."
                sleep "$delay"
                delay=$((delay * 2))
                continue
              fi
              if [ "$HTTP_CODE" -eq 200 ]; then
                cat /tmp/curl_response_$$.json
                return 0
              elif [ "$HTTP_CODE" -eq 429 ]; then
                echo "::warning::Got 429 (attempt $i/$max_retries). Retrying in ${delay}s..."
                sleep "$delay"
                delay=$((delay * 2))
              else
                echo "::error::HTTP $HTTP_CODE from API"
                cat /tmp/curl_response_$$.json >&2
                return 1
              fi
            done
            echo "::error::Exhausted retries (last HTTP $HTTP_CODE)"
            return 1
          }

          RESPONSE=$(retry_curl \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            https://models.github.ai/inference/chat/completions)

          if [ -z "$RESPONSE" ]; then
            echo "::error::API response is empty (architect)"
            exit 1
          fi

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          if [ -z "$CONTENT" ] || [ "$CONTENT" = "null" ]; then
            echo "::error::API response missing expected content (architect)"
            exit 1
          fi

          {
            echo "ARCHITECT_KNOWLEDGE<<ENDARCHITECT"
            echo "$CONTENT"
            echo "ENDARCHITECT"
          } >> "$GITHUB_ENV"

      - name: Generate developer knowledge
        if: steps.check_commits.outputs.commit_count != '0'
        id: developer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYSTEM_PROMPT="You are an expert software engineer generating a knowledge reference file for an AI developer agent working on this project.
          You may refine, update, or build on the prior knowledge provided — keep what is still accurate and update what has changed.

          Focus on:
          - Code patterns and idioms used (error handling, logging, configuration)
          - Naming conventions for files, packages, functions, and variables
          - Testing patterns and framework usage
          - Build and run commands
          - Common gotchas visible in the code that a new developer should know

          Output rules:
          - Output pure markdown, no preamble or meta-commentary
          - Stay under 500 lines
          - Be specific and actionable, not generic
          - Use the actual names, files, and patterns present in this codebase"

          PRIOR_KNOWLEDGE=$(head -100 misc/knowledge/developer-knowledge.md 2>/dev/null || echo "")
          if [ -n "$PRIOR_KNOWLEDGE" ]; then
            USER_MESSAGE="${PROJECT_CONTEXT}

          === Prior Knowledge ===
          ${PRIOR_KNOWLEDGE}"
          else
            USER_MESSAGE="$PROJECT_CONTEXT"
          fi

          PAYLOAD=$(jq -n \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "$USER_MESSAGE" \
            '{
              model: "openai/gpt-4o-mini",
              messages: [
                {role: "system", content: $system},
                {role: "user", content: $user}
              ],
              max_tokens: 2048,
              temperature: 0.3
