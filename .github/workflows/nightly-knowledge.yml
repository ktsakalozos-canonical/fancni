                sleep "$delay"
                delay=$((delay * 2))
                continue
              fi
              if [ "$HTTP_CODE" -eq 200 ]; then
                cat /tmp/curl_response_$$.json
                return 0
              elif [ "$HTTP_CODE" -eq 429 ]; then
                echo "::warning::Got 429 (attempt $i/$max_retries). Retrying in ${delay}s..."
                sleep "$delay"
                delay=$((delay * 2))
              else
                echo "::error::HTTP $HTTP_CODE from API"
                cat /tmp/curl_response_$$.json >&2
                return 1
              fi
            done
            echo "::error::Exhausted retries (last HTTP $HTTP_CODE)"
            return 1
          }

          RESPONSE=$(retry_curl \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            https://models.github.ai/inference/chat/completions)

          if [ -z "$RESPONSE" ]; then
            echo "::error::API response is empty (developer)"
            exit 1
          fi

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          if [ -z "$CONTENT" ] || [ "$CONTENT" = "null" ]; then
            echo "::error::API response missing expected content (developer)"
            exit 1
          fi

          {
            echo "DEVELOPER_KNOWLEDGE<<ENDDEVELOPER"
            echo "$CONTENT"
            echo "ENDDEVELOPER"
          } >> "$GITHUB_ENV"

      - name: Generate code-reviewer knowledge
        if: steps.check_commits.outputs.commit_count != '0'
        id: code_reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYSTEM_PROMPT="You are an expert code reviewer generating a knowledge reference file for an AI code-reviewer agent working on this project.
          You may refine, update, or build on the prior knowledge provided — keep what is still accurate and update what has changed.

          Focus on:
          - Areas with weak or missing test coverage
          - Security-sensitive code paths
          - Code smells or inconsistencies currently present in the codebase
          - Error handling gaps

          Output rules:
          - Output pure markdown, no preamble or meta-commentary
          - Stay under 500 lines
          - Be specific and actionable, not generic
          - Use the actual names, files, and patterns present in this codebase"

          PRIOR_KNOWLEDGE=$(head -100 misc/knowledge/code-reviewer-knowledge.md 2>/dev/null || echo "")
          if [ -n "$PRIOR_KNOWLEDGE" ]; then
            USER_MESSAGE="${PROJECT_CONTEXT}

          === Prior Knowledge ===
          ${PRIOR_KNOWLEDGE}"
          else
            USER_MESSAGE="$PROJECT_CONTEXT"
          fi

          PAYLOAD=$(jq -n \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "$USER_MESSAGE" \
            '{
              model: "openai/gpt-4o-mini",
              messages: [
                {role: "system", content: $system},
                {role: "user", content: $user}
              ],
