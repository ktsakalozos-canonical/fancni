            -d "$PAYLOAD" \
            https://models.github.ai/inference/chat/completions)

          if [ -z "$RESPONSE" ]; then
            echo "::error::API response is empty (repo-scout)"
            exit 1
          fi

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          if [ -z "$CONTENT" ] || [ "$CONTENT" = "null" ]; then
            echo "::error::API response missing expected content (repo-scout)"
            exit 1
          fi

          {
            echo "REPO_SCOUT_KNOWLEDGE<<ENDSCOUT"
            echo "$CONTENT"
            echo "ENDSCOUT"
          } >> "$GITHUB_ENV"

      - name: Write knowledge files
        if: steps.check_commits.outputs.commit_count != '0'
        run: |
          mkdir -p misc/knowledge

          write_knowledge() {
            local agent="$1"
            local content="$2"
            local outfile="misc/knowledge/${agent}-knowledge.md"
            printf '%s\n' "$content" | head -500 > "$outfile"
            echo "Wrote $outfile"
          }

          write_knowledge "architect"      "$ARCHITECT_KNOWLEDGE"
          write_knowledge "developer"      "$DEVELOPER_KNOWLEDGE"
          write_knowledge "code-reviewer"  "$CODE_REVIEWER_KNOWLEDGE"
          write_knowledge "code-reviewerer" "$CODE_REVIEWERER_KNOWLEDGE"
          write_knowledge "repo-scout"     "$REPO_SCOUT_KNOWLEDGE"

      - name: Commit and push
        if: steps.check_commits.outputs.commit_count != '0'
        run: |
          git config user.name "Knowledge Bot"
          git config user.email "knowledge-bot@users.noreply.github.com"
          git add misc/knowledge/
          if ! git diff --cached --quiet; then
            git commit -m "knowledge-bot: update agent knowledge files [skip ci]"
            git push
          else
            echo "No changes to knowledge files. Skipping commit."
          fi
