            exit 1
          fi

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          if [ -z "$CONTENT" ] || [ "$CONTENT" = "null" ]; then
            echo "::error::API response missing expected content (code-reviewer)"
            exit 1
          fi

          {
            echo "CODE_REVIEWER_KNOWLEDGE<<ENDREVIEWER"
            echo "$CONTENT"
            echo "ENDREVIEWER"
          } >> "$GITHUB_ENV"

      - name: Generate code-reviewerer knowledge
        if: steps.check_commits.outputs.commit_count != '0'
        id: code_reviewerer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYSTEM_PROMPT="You are an expert code reviewer generating a knowledge reference file for an AI code-reviewerer agent working on this project.
          You may refine, update, or build on the prior knowledge provided — keep what is still accurate and update what has changed.

          Focus on:
          - Edge cases that are not handled or tested
          - Race conditions and concurrency hazards
          - Resource leaks (goroutines, file handles, connections)
          - Maintainability concerns: overly complex logic, poor abstractions, hidden coupling

          Output rules:
          - Output pure markdown, no preamble or meta-commentary
          - Stay under 500 lines
          - Be specific and actionable, not generic
          - Use the actual names, files, and patterns present in this codebase"

          PRIOR_KNOWLEDGE=$(head -100 misc/knowledge/code-reviewerer-knowledge.md 2>/dev/null || echo "")
          if [ -n "$PRIOR_KNOWLEDGE" ]; then
            USER_MESSAGE="${PROJECT_CONTEXT}

          === Prior Knowledge ===
          ${PRIOR_KNOWLEDGE}"
          else
            USER_MESSAGE="$PROJECT_CONTEXT"
          fi

          PAYLOAD=$(jq -n \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "$USER_MESSAGE" \
