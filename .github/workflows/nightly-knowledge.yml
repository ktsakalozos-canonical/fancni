      - name: Generate repo-scout knowledge
        if: steps.check_commits.outputs.commit_count != '0'
        id: repo_scout
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SYSTEM_PROMPT="You are an expert repository analyst generating a knowledge reference file for an AI repo-scout agent working on this project.
          You may refine, update, or build on the prior knowledge provided — keep what is still accurate and update what has changed.

          Focus on:
          - Dependency list with versions (from go.mod and any other manifests)
          - Build and deploy tooling state (Makefile targets, scripts, Docker, CI)
          - CI workflow inventory (what workflows exist and what they do)
          - Project structure map with hotspots (most-changed or most-critical directories/files)

          Output rules:
          - Output pure markdown, no preamble or meta-commentary
          - Stay under 500 lines
          - Be specific and actionable, not generic
          - Use the actual names, files, and patterns present in this codebase"

          PRIOR_KNOWLEDGE=$(head -100 misc/knowledge/repo-scout-knowledge.md 2>/dev/null || echo "")
          if [ -n "$PRIOR_KNOWLEDGE" ]; then
