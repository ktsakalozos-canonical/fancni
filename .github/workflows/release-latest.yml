name: release-latest

on:
  workflow_run:
    workflows: ["ci-tests"]
    types: [completed]

jobs:
  release:
    name: Release
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io/${{ github.repository_owner }}
      SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Rockcraft
        run: sudo snap install rockcraft --classic

      - name: Install LXD
        run: |
          sudo snap install lxd
          sudo lxd init --auto
          sudo lxd waitready

      - name: Add runner to lxd group
        run: sudo usermod -aG lxd "$USER"

      - name: Build rock
        run: sg lxd -c "rockcraft pack"

      - name: Push rock to GHCR
        run: |
          rockcraft.skopeo --insecure-policy copy \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            oci-archive:fancni_0.1_amd64.rock \
            "docker://${REGISTRY}/fancni:${SHA}"
          rockcraft.skopeo --insecure-policy copy \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            oci-archive:fancni_0.1_amd64.rock \
            "docker://${REGISTRY}/fancni:latest"
